---

version: "2"

run:
  timeout: 5m

linters:
  default: none

  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    - bodyclose
    - contextcheck
    - copyloopvar
    - durationcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forcetypeassert
    - gocheckcompilerdirectives
    - gomoddirectives
    - gosec
    - intrange
    - iotamixing
    - makezero
    - mirror
    - modernize
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nosprintfhostport
    - predeclared
    - protogetter
    - reassign
    - recvcheck
    - rowserrcheck
    - sqlclosecheck
    - usestdlibvars
    - wastedassign
    - wrapcheck

    - gocritic
    - perfsprint
    - prealloc
    - revive
    - unconvert
    - unparam

    - godot
    - misspell

    - paralleltest
    - testableexamples
    - testifylint
    - thelper
    - tparallel
    - usetesting

    - mnd

    - forbidigo

  settings:
    govet:
      enable-all: true

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003

    revive:
      enable-all-rules: false
      rules:
        - name: blank-imports
        - name: context-as-argument
          arguments:
            - allowTypesBefore: "*testing.T,*testing.B,*testing.F,testing.TB"
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-naming
        - name: if-return
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unreachable-code

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

    misspell:
      locale: US

    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign

    exhaustive:
      default-signifies-exhaustive: false

    forbidigo:
      forbid:
        - pattern: '^new$'
          msg: >-
            use a struct literal with all fields or a constructor function
            instead of new() (FLM_APP_0007 §公開 struct の最小化)
        - pattern: '^assert\.JSONEq(f)?$'
          msg: >-
            use raw string comparison (assert.Equal) instead of assert.JSONEq
            (FLM_APP_0009 §assertion 規約: JSON は生文字列で全体比較)
        - pattern: '^require\.JSONEq(f)?$'
          msg: >-
            use raw string comparison (require.Equal) instead of require.JSONEq
            (FLM_APP_0009 §assertion 規約: JSON は生文字列で全体比較)
        - pattern: '^assert\.YAMLEq(f)?$'
          msg: >-
            use raw string comparison (assert.Equal) instead of assert.YAMLEq
            (FLM_APP_0009 §assertion 規約: YAML は生文字列で全体比較)
        - pattern: '^require\.YAMLEq(f)?$'
          msg: >-
            use raw string comparison (require.Equal) instead of require.YAMLEq
            (FLM_APP_0009 §assertion 規約: YAML は生文字列で全体比較)

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
        - ex.New(
        - ex.Errorf(
        - ex.Wrap(
        - ex.Wrapf(

    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - io.WriteString

    gosec:
      severity: low
      confidence: low
      # G304 / G703 (path inclusion / taint analysis): CLI ツールは利用者から
      # filesystem path 引数を受け取って読み書きするのが本質責務であり、 path 引数の
      # 非リテラル化を全面禁止する両 rule は false positive 生成器となる
      # (FLM_APP_0008 §影響: G304 と同じ理由で G703 も globally 無効化)。
      # G204 (subprocess with variable): `flame install` は flame.yaml の
      # `flame.harness.version` を `git clone --branch <version>` の引数として
      # 渡す経路 (FLM_FEA_0003 §チャネル C) を持つ。 version 値は manifest 経由で
      # 利用側が指定する parameter であり shell 呼び出し用の任意文字列ではないため
      # G204 の検出意図と一致しない。
      # G122 (filesystem operation in WalkDir without root-scoped APIs):
      # `flame install` の vendor sync は temp dir に git clone した内容を repo
      # 内へ rsync する経路 (FLM_FEA_0003 §チャネル C) で、 temp dir は git
      # checkout 直後の閉じた tree のため symlink TOCTOU 攻撃面が無い。
      excludes:
        - G304
        - G703
        - G204
        - G122

    gomoddirectives:
      replace-local: false
      replace-allow-list: []

  exclusions:
    generated: strict
    presets: []
    rules: []
    paths: []
    paths-except: []

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

  settings:
    gofumpt:
      extra-rules: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
