    - install: .markdownlint-cli2.yaml
      vendor: vendor/flame/.markdownlint-cli2.yaml
      merge: deep
      content: |
        ---
        config:
          MD013: false
      vendor_content: |
        ---
        config:
          MD013: false
    - install: .shellcheckrc
      vendor: vendor/flame/.shellcheckrc
      merge: append
      content: |
        disable=SC2016
      vendor_content: |
        disable=SC2016
    - install: .vscode/extensions.json
      vendor: vendor/flame/.vscode/extensions.json
      merge: deep
      content: |
        {
          "recommendations": [
            "golang.go",
            "GitHub.vscode-pull-request-github",
            "github.vscode-github-actions",
            "mkhl.direnv"
          ]
        }
      vendor_content: |
        {
          "recommendations": [
            "golang.go",
            "GitHub.vscode-pull-request-github",
            "github.vscode-github-actions",
            "mkhl.direnv"
          ]
        }
    - install: .vscode/settings.json
      vendor: vendor/flame/.vscode/settings.json
      merge: deep
      content: |
        {
            "git.detectWorktrees": true
        }
      vendor_content: |
        {
            "git.detectWorktrees": true
        }
    - install: devbox.json
      vendor: vendor/flame/devbox.json
      merge: deep
      content: |
        {
          "$schema": "https://raw.githubusercontent.com/jetify-com/devbox/0.17.2/.schema/devbox.schema.json",
          "packages": [
            "act@0.2.87",
            "actionlint@1.7.12",
            "gh@2.91.0",
            "go@1.26.2",
            "golangci-lint@2.11.4",
            "jq@1.8.1",
            "markdownlint-cli2@0.21.0",
            "shellcheck@0.11.0",
            "yamllint@1.37.1",
            "yq-go@4.53.2"
          ],
          "shell": {
            "init_hook": [
              "bash vendor/flame/devbox/init.sh"
            ]
          }
        }
      vendor_content: |
        {
          "$schema": "https://raw.githubusercontent.com/jetify-com/devbox/0.17.2/.schema/devbox.schema.json",
          "packages": [
            "act@0.2.87",
