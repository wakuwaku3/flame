---
# flame harness lockfile (FLM_FEA_0003、 CLI 自動生成・更新)
flame:
  harness:
    files:
      - install: .golangci.yaml
        vendor: vendor/flame/.golangci.yaml
        merge: deep
        content: |
          ---

          version: "2"

          run:
            timeout: 5m

          linters:
            default: none

            enable:
              - errcheck
              - govet
              - ineffassign
              - staticcheck
              - unused

              - bodyclose
              - contextcheck
              - copyloopvar
              - durationcheck
              - errchkjson
              - errname
              - errorlint
              - exhaustive
              - exhaustruct
              - exptostd
              - fatcontext
              - forcetypeassert
              - gocheckcompilerdirectives
              - gomoddirectives
              - gosec
              - intrange
              - iotamixing
              - makezero
              - mirror
              - modernize
              - nilerr
              - nilnesserr
              - nilnil
              - noctx
              - nosprintfhostport
              - predeclared
              - protogetter
              - reassign
              - recvcheck
              - rowserrcheck
              - sqlclosecheck
              - usestdlibvars
              - wastedassign
              - wrapcheck

              - gocritic
              - perfsprint
              - prealloc
              - revive
              - unconvert
              - unparam

              - godot
              - misspell

              - paralleltest
              - testableexamples
              - testifylint
              - thelper
              - tparallel
              - usetesting

              - mnd

              - forbidigo

            settings:
              govet:
                enable-all: true

              staticcheck:
                checks:
                  - all
                  - -ST1000
                  - -ST1003

              revive:
                enable-all-rules: false
                rules:
                  - name: blank-imports
                  - name: context-as-argument
                    arguments:
                      - allowTypesBefore: "*testing.T,*testing.B,*testing.F,testing.TB"
                  - name: context-keys-type
                  - name: dot-imports
                  - name: error-return
                  - name: error-naming
                  - name: if-return
                  - name: indent-error-flow
                  - name: range
                  - name: receiver-naming
                  - name: redefines-builtin-id
                  - name: superfluous-else
                  - name: time-naming
                  - name: unreachable-code

              gocritic:
                enabled-tags:
                  - diagnostic
                  - performance
                  - style

              misspell:
                locale: US

              mnd:
                checks:
                  - argument
                  - case
                  - condition
                  - operation
                  - return
                  - assign

              exhaustive:
                default-signifies-exhaustive: false

              forbidigo:
                forbid:
                  - pattern: '^new$'
                    msg: >-
                      use a struct literal with all fields or a constructor function
                      instead of new() (FLM_APP_0007 §公開 struct の最小化)
                  - pattern: '^assert\.JSONEq(f)?$'
                    msg: >-
                      use raw string comparison (assert.Equal) instead of assert.JSONEq
                      (FLM_APP_0009 §assertion 規約: JSON は生文字列で全体比較)
                  - pattern: '^require\.JSONEq(f)?$'
                    msg: >-
                      use raw string comparison (require.Equal) instead of require.JSONEq
                      (FLM_APP_0009 §assertion 規約: JSON は生文字列で全体比較)
                  - pattern: '^assert\.YAMLEq(f)?$'
                    msg: >-
                      use raw string comparison (assert.Equal) instead of assert.YAMLEq
                      (FLM_APP_0009 §assertion 規約: YAML は生文字列で全体比較)
                  - pattern: '^require\.YAMLEq(f)?$'
                    msg: >-
                      use raw string comparison (require.Equal) instead of require.YAMLEq
                      (FLM_APP_0009 §assertion 規約: YAML は生文字列で全体比較)

              wrapcheck:
                ignore-sigs:
                  - .Errorf(
                  - errors.New(
                  - errors.Unwrap(
                  - errors.Join(
                  - .Wrap(
                  - .Wrapf(
                  - .WithMessage(
                  - .WithMessagef(
                  - .WithStack(
                  - ex.New(
                  - ex.Errorf(
                  - ex.Wrap(
                  - ex.Wrapf(

              errcheck:
                check-type-assertions: true
                check-blank: false
                exclude-functions:
                  - fmt.Fprint
                  - fmt.Fprintf
                  - fmt.Fprintln
                  - io.WriteString

              gosec:
                severity: low
                confidence: low
                excludes:
                  - G304

              gomoddirectives:
                replace-local: false
                replace-allow-list: []

            exclusions:
              generated: strict
              presets: []
              rules: []
              paths: []
              paths-except: []

          formatters:
            enable:
              - gofmt
              - gofumpt
              - goimports

            settings:
              gofumpt:
                extra-rules: true

          issues:
            max-issues-per-linter: 0
            max-same-issues: 0
      - install: .markdownlint-cli2.yaml
        vendor: vendor/flame/.markdownlint-cli2.yaml
        merge: deep
        content: |
          ---
          config:
            MD013: false
      - install: .shellcheckrc
        vendor: vendor/flame/.shellcheckrc
        merge: append
        content: |
          disable=SC2016
      - install: .vscode/extensions.json
        vendor: vendor/flame/.vscode/extensions.json
        merge: deep
        content: |
          {
            "recommendations": [
              "golang.go",
              "GitHub.vscode-pull-request-github",
              "github.vscode-github-actions",
              "mkhl.direnv"
            ]
          }
      - install: .vscode/settings.json
        vendor: vendor/flame/.vscode/settings.json
        merge: deep
        content: |
          {
              "git.detectWorktrees": true
          }
      - install: devbox.json
        vendor: vendor/flame/devbox.json
        merge: deep
        content: |
          {
            "$schema": "https://raw.githubusercontent.com/jetify-com/devbox/0.17.2/.schema/devbox.schema.json",
            "packages": [
              "act@0.2.87",
              "actionlint@1.7.12",
              "gh@2.91.0",
              "go@1.26.2",
              "golangci-lint@2.11.4",
              "jq@1.8.1",
              "markdownlint-cli2@0.21.0",
              "shellcheck@0.11.0",
              "yamllint@1.37.1",
              "yq-go@4.53.2"
            ],
            "shell": {
              "init_hook": [
                "bash vendor/flame/devbox/init.sh"
              ]
            }
          }
      - install: schemas/flame.yaml.schema.yaml
        vendor: vendor/flame/schemas/flame.yaml.schema.yaml
        merge: deep
        content: |
          ---
          # yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
          $schema: https://json-schema.org/draft/2020-12/schema
          $id: https://raw.githubusercontent.com/wakuwaku3/flame/main/vendor/flame/schemas/flame.yaml.schema.yaml
          title: flame.yaml
          description: |
            flame harness manifest. Refer to FLM_FEA_0003 §flame.yaml (manifest) for the
            normative specification.
          type: object
          required:
            - flame
          additionalProperties: false
          properties:
            flame:
              type: object
              description: flame harness が参照する repo 固有設定の単一 namespace.
              required:
                - harness
              additionalProperties: false
              properties:
                harness:
                  $ref: "#/$defs/harness"
                ai:
                  $ref: "#/$defs/ai"
          $defs:
            harness:
              type: object
              description: |
                vendor チャネルの取得元と version (= 不変情報 = 手動編集で更新するメタデータ).
              required:
                - source
                - version
              additionalProperties: false
              properties:
                source:
                  type: string
                  description: vendor の取得元リポジトリ (例 github.com/<owner>/<repo>).
                  minLength: 1
                version:
                  description: |
                    install 済み harness のバージョン. 通常は vX.Y.Z 形式の release tag を指定する.
                    harness の source 提供元 repo (= flame self) では特別マーカー値 'self' を指定する.
                  oneOf:
                    - type: string
                      pattern: ^v\d+\.\d+\.\d+$
                      description: release tag (vX.Y.Z).
                    - type: string
                      const: self
                      description: harness の source 提供元 repo を示す特別マーカー.
                ignore:
                  type: array
                  description: flame install の通常工程のうち skip するものの list.
                  $comment: |
                    items.enum は FLM_FEA_0003 §flame.yaml (manifest) の flame.harness.ignore
                    valid value list と同期する. 拡張時は ADR を SoT として先に改訂し当該 enum
                    を追従させる.
                  items:
                    enum:
                      - .gitignore
                      - .claude/plugins
                  uniqueItems: true
            ai:
              type: object
              description: |
                AI hook の repo 固有拡張領域. 既知 hook category のみ厳密検査, 未知 category
                は素通し.
              additionalProperties: true
              properties:
                pre_push:
                  $ref: "#/$defs/aiPrePush"
            aiPrePush:
              type: object
              description: flame ai hook pre-push の repo 固有拡張.
              additionalProperties: false
              properties:
                stage1_extra_agents:
                  type: array
                  description: |
                    段階 1 並列レビューに組み込む repo-local reviewer agent 名 list.
                    各要素は当該 repo の .claude/agents/<name>.md の name frontmatter と
                    一致する文字列. 重複は先勝ち de-dup される.
                  items:
                    type: string
                    minLength: 1
                  uniqueItems: true
    embeds:
      - install: CLAUDE.md
        target: vendor/flame/CLAUDE.md
        snippet: |
          [vendor/flame/CLAUDE.md](vendor/flame/CLAUDE.md)
      - install: .envrc
        target: vendor/flame/.envrc
        snippet: |
          source_env_if_exists vendor/flame/.envrc
      - install: .yamllint
        target: vendor/flame/.yamllint
        snippet: |
          extends: vendor/flame/.yamllint
