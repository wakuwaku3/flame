  embeds:
    - install: CLAUDE.md
      target: vendor/flame/CLAUDE.md
      snippet: |
        [vendor/flame/CLAUDE.md](vendor/flame/CLAUDE.md)
    - install: .envrc
      target: vendor/flame/.envrc
      snippet: |
        source_env_if_exists vendor/flame/.envrc
    - install: .yamllint
      target: vendor/flame/.yamllint
      snippet: |
        extends: vendor/flame/.yamllint
