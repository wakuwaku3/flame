    - install: schemas/flame.yaml.schema.yaml
      vendor: vendor/flame/schemas/flame.yaml.schema.yaml
      merge: deep
      content: |
        ---
        # yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
        $schema: https://json-schema.org/draft/2020-12/schema
        $id: https://raw.githubusercontent.com/wakuwaku3/flame/main/vendor/flame/schemas/flame.yaml.schema.yaml
        title: flame.yaml
        description: |
          flame harness manifest. Refer to FLM_FEA_0003 §flame.yaml (manifest) for the
          normative specification.
        type: object
        required:
          - flame
        additionalProperties: false
        properties:
          flame:
            type: object
            description: flame harness が参照する repo 固有設定の単一 namespace.
            required:
              - source
              - version
            additionalProperties: false
            properties:
              source:
                type: string
                description: vendor の取得元リポジトリ (例 github.com/<owner>/<repo>).
                minLength: 1
              version:
                description: |
                  install 済み harness のバージョン. 通常は vX.Y.Z 形式の release tag を指定する.
                  harness の source 提供元 repo (= flame self) では特別マーカー値 'self' を指定する.
                oneOf:
                  - type: string
                    pattern: ^v\d+\.\d+\.\d+$
                    description: release tag (vX.Y.Z).
                  - type: string
                    const: self
                    description: harness の source 提供元 repo を示す特別マーカー.
              ignore:
                type: array
                description: flame install の通常工程のうち skip するものの list (機能単位).
                $comment: |
                  items.enum は FLM_FEA_0003 §機能単位 ignore の機能 ID 一覧 と同期する.
                  拡張時は ADR を SoT として先に改訂し、 CLI 側 install.AllFeatures() と
                  当該 enum の双方を追従させる.
                items:
                  enum:
                    - vendor-sync
                    - vendor-readonly
                    - read-only
                    - gitignore
                    - claude/plugins
                    - trigger-workflow
                    - claude/rules
                    - claude/skills
                    - golangci-lint
                    - markdown-lint
                    - shellcheck
                    - devbox
                    - vscode
                    - adr
                    - embed/claude-md
                    - embed/envrc
                    - embed/yamllint
                uniqueItems: true
              ai:
                $ref: "#/$defs/ai"
        $defs:
          ai:
            type: object
            description: |
              AI hook の repo 固有拡張領域. 既知 hook category のみ厳密検査, 未知 category
              は素通し.
            additionalProperties: true
            properties:
              pre_push:
                $ref: "#/$defs/aiPrePush"
          aiPrePush:
            type: object
            description: flame ai hook pre-push の repo 固有拡張.
            additionalProperties: false
            properties:
              stage1_extra_agents:
                type: array
                description: |
                  段階 1 並列レビューに組み込む repo-local reviewer agent 名 list.
                  各要素は当該 repo の .claude/agents/<name>.md の name frontmatter と
                  一致する文字列. 重複は先勝ち de-dup される.
                items:
                  type: string
                  minLength: 1
                uniqueItems: true
      vendor_content: |
        ---
        # yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
        $schema: https://json-schema.org/draft/2020-12/schema
        $id: https://raw.githubusercontent.com/wakuwaku3/flame/main/vendor/flame/schemas/flame.yaml.schema.yaml
        title: flame.yaml
        description: |
          flame harness manifest. Refer to FLM_FEA_0003 §flame.yaml (manifest) for the
          normative specification.
        type: object
        required:
          - flame
        additionalProperties: false
        properties:
          flame:
            type: object
            description: flame harness が参照する repo 固有設定の単一 namespace.
            required:
              - source
              - version
            additionalProperties: false
            properties:
              source:
                type: string
                description: vendor の取得元リポジトリ (例 github.com/<owner>/<repo>).
                minLength: 1
              version:
                description: |
                  install 済み harness のバージョン. 通常は vX.Y.Z 形式の release tag を指定する.
                  harness の source 提供元 repo (= flame self) では特別マーカー値 'self' を指定する.
                oneOf:
                  - type: string
                    pattern: ^v\d+\.\d+\.\d+$
                    description: release tag (vX.Y.Z).
                  - type: string
                    const: self
                    description: harness の source 提供元 repo を示す特別マーカー.
              ignore:
                type: array
                description: flame install の通常工程のうち skip するものの list (機能単位).
                $comment: |
                  items.enum は FLM_FEA_0003 §機能単位 ignore の機能 ID 一覧 と同期する.
                  拡張時は ADR を SoT として先に改訂し、 CLI 側 install.AllFeatures() と
                  当該 enum の双方を追従させる.
                items:
                  enum:
                    - vendor-sync
                    - vendor-readonly
                    - read-only
                    - gitignore
                    - claude/plugins
                    - trigger-workflow
                    - claude/rules
                    - claude/skills
                    - golangci-lint
                    - markdown-lint
                    - shellcheck
                    - devbox
                    - vscode
                    - adr
                    - embed/claude-md
                    - embed/envrc
                    - embed/yamllint
                uniqueItems: true
              ai:
                $ref: "#/$defs/ai"
        $defs:
          ai:
            type: object
            description: |
              AI hook の repo 固有拡張領域. 既知 hook category のみ厳密検査, 未知 category
              は素通し.
            additionalProperties: true
            properties:
              pre_push:
                $ref: "#/$defs/aiPrePush"
          aiPrePush:
            type: object
            description: flame ai hook pre-push の repo 固有拡張.
            additionalProperties: false
            properties:
              stage1_extra_agents:
                type: array
                description: |
                  段階 1 並列レビューに組み込む repo-local reviewer agent 名 list.
                  各要素は当該 repo の .claude/agents/<name>.md の name frontmatter と
                  一致する文字列. 重複は先勝ち de-dup される.
                items:
                  type: string
                  minLength: 1
                uniqueItems: true
  embeds:
    - install: CLAUDE.md
      target: vendor/flame/CLAUDE.md
      snippet: |
        [vendor/flame/CLAUDE.md](vendor/flame/CLAUDE.md)
    - install: .envrc
      target: vendor/flame/.envrc
      snippet: |
        source_env_if_exists vendor/flame/.envrc
    - install: .yamllint
      target: vendor/flame/.yamllint
      snippet: |
        extends: vendor/flame/.yamllint
